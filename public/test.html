<!DOCTYPE html>
<html>
<head>
    <title>Test Page</title>
</head>
<body>
    <h1>✅ Si ves esto, el túnel funciona</h1>
    <p>URL actual: <span id="url"></span></p>
    <script>document.getElementById('url').textContent = window.location.origin</script>
    
    <h2>Probando API...</h2>
    <div id="result"></div>
    <script>
        fetch('/api/health')
            .then(r => r.json())
            .then(d => {
                document.getElementById('result').innerHTML = '✅ API: ' + JSON.stringify(d);
            })
            .catch(e => {
                document.getElementById('result').innerHTML = '❌ Error: ' + e;
            });
    </script>
</body>
</html>
