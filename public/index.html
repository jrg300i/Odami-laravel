<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapicería Odami - Sistema de Gestión</title>

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Vue.js 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100">
    <div id="app" v-cloak class="min-h-screen">
        <!-- Componente de Login -->
        <login-component 
            v-if="!usuario" 
            :error="error" 
            :cargando="cargando"
            @login="realizarLogin">
        </login-component>

        <!-- App Principal -->
        <div v-else class="flex flex-col h-screen">
            <!-- Navbar -->
            <navbar-component 
                :usuario="usuario"
                :vista-actual="vistaActual"
                :menu-items="menuItems"
                :notificaciones-count="notificacionesCount"
                :cargando="cargando"
                @navegar="navegar"
                @refrescar="refrescarDatos"
                @toggle-notificaciones="toggleNotificaciones"
                @abrir-menu-usuario="abrirMenuUsuario">
            </navbar-component>

            <!-- Drawer Menú Usuario -->
            <drawer-menu-component
                v-if="mostrarMenuUsuario"
                :usuario="usuario"
                :cerrar="cerrarMenuUsuario">
            </drawer-menu-component>

            <!-- Contenedor Principal -->
            <div class="flex flex-1 overflow-hidden">
                <main class="flex-1 overflow-auto bg-gray-100">
                    <div class="p-4 md:p-6">
                        <!-- Dashboard -->
                        <dashboard-component 
                            v-if="vistaActual === 'dashboard'"
                            :stats="stats"
                            @navegar="navegar">
                        </dashboard-component>

                        <!-- Clientes -->
                        <clientes-component 
                            v-if="vistaActual === 'clientes'"
                            :clientes="clientes"
                            :cargando="cargando"
                            @nuevo="abrirModalCliente"
                            @editar="abrirModalCliente"
                            @ver="verDetalleCliente"
                            @eliminar="eliminarCliente">
                        </clientes-component>

                        <!-- Trabajos -->
                        <trabajos-component 
                            v-if="vistaActual === 'trabajos'"
                            :trabajos="trabajos"
                            :filtro-estado="filtroEstado"
                            :cargando="cargando"
                            @nuevo="abrirModalTrabajo"
                            @editar="abrirModalTrabajo"
                            @actualizar-estado="actualizarEstadoTrabajo"
                            @ver="verDetalleTrabajo"
                            @eliminar="eliminarTrabajo"
                            @cambiar-filtro="cambiarFiltroEstado">
                        </trabajos-component>

                        <!-- Inventario -->
                        <inventario-component 
                            v-if="vistaActual === 'inventario'"
                            :inventario="inventario"
                            :filtro-categoria="filtroCategoria"
                            :cargando="cargando"
                            @nuevo="abrirModalInventario"
                            @editar="abrirModalInventario"
                            @ver="verDetalleInventario"
                            @movimiento="registrarMovimiento"
                            @eliminar="eliminarInventario"
                            @cambiar-filtro="cambiarFiltroCategoria">
                        </inventario-component>

                        <!-- Categorías -->
                        <categorias-component 
                            v-if="vistaActual === 'categorias'"
                            :categorias="categoriasFiltradas"
                            :filtro-categoria="filtroCategoria"
                            :cargando="cargando"
                            @nuevo="abrirModalCategoria"
                            @editar="abrirModalCategoria"
                            @eliminar="eliminarCategoria"
                            @cambiar-filtro="filtroCategoria = $event">
                        </categorias-component>

                        <!-- Proveedores -->
                        <proveedores-component 
                            v-if="vistaActual === 'proveedores'"
                            :proveedores="proveedoresFiltrados"
                            :busqueda="busquedaProveedor"
                            :filtro-proveedor="filtroProveedor"
                            :cargando="cargando"
                            @nuevo="abrirModalProveedor"
                            @editar="abrirModalProveedor"
                            @eliminar="eliminarProveedor"
                            @buscar="busquedaProveedor = $event"
                            @cambiar-filtro="filtroProveedor = $event">
                        </proveedores-component>

                        <!-- Facturas -->
                        <facturas-component 
                            v-if="vistaActual === 'facturas'"
                            :facturas="facturas"
                            :cargando="cargando"
                            @nueva="abrirModalFactura"
                            @editar="abrirModalFactura"
                            @ver="verDetalleFactura"
                            @imprimir="imprimirFactura"
                            @eliminar="eliminarFactura">
                        </facturas-component>
                    </div>
                </main>
            </div>
        </div>

        <!-- Modales -->
        <modal-cliente-component
            v-if="modalAbierto === 'cliente'"
            :editing-cliente="editingCliente"
            :cliente-form="clienteForm"
            @cerrar="cerrarModal"
            @guardar="guardarCliente">
        </modal-cliente-component>

        <modal-trabajo-component
            v-if="modalAbierto === 'trabajo'"
            :editing-trabajo="editingTrabajo"
            :trabajo-form="trabajoForm"
            :clientes="clientes"
            @cerrar="cerrarModal"
            @guardar="guardarTrabajo">
        </modal-trabajo-component>

        <modal-inventario-component
            v-if="modalAbierto === 'inventario'"
            :editing-inventario="editingInventario"
            :inventario-form="inventarioForm"
            :categorias="categorias"
            @cerrar="cerrarModal"
            @guardar="guardarInventario">
        </modal-inventario-component>

        <modal-categoria-component
            v-if="modalAbierto === 'categoria'"
            :editing-categoria="editingCategoria"
            :categoria-form="categoriaForm"
            @cerrar="cerrarModal"
            @guardar="guardarCategoria">
        </modal-categoria-component>

        <modal-proveedor-component
            v-if="modalAbierto === 'proveedor'"
            :editing-proveedor="editingProveedor"
            :proveedor-form="proveedorForm"
            @cerrar="cerrarModal"
            @guardar="guardarProveedor">
        </modal-proveedor-component>

        <modal-factura-component
            v-if="modalAbierto === 'factura'"
            :editing-factura="editingFactura"
            :factura-form="facturaForm"
            :trabajos="trabajos"
            @cerrar="cerrarModal"
            @guardar="guardarFactura">
        </modal-factura-component>

        <modal-movimiento-component
            v-if="modalAbierto === 'movimiento'"
            :item-movimiento="itemMovimiento"
            :movimiento-form="movimientoForm"
            @cerrar="cerrarModal"
            @guardar="guardarMovimiento">
        </modal-movimiento-component>

        <modal-ver-trabajo-component
            v-if="modalAbierto === 'ver-trabajo'"
            :trabajo-detalle="trabajoDetalle"
            @cerrar="cerrarModal">
        </modal-ver-trabajo-component>

        <modal-ver-cliente-component
            v-if="modalAbierto === 'ver-cliente'"
            :cliente-detalle="clienteDetalle"
            @cerrar="cerrarModal">
        </modal-ver-cliente-component>

        <modal-ver-inventario-component
            v-if="modalAbierto === 'ver-inventario'"
            :inventario-detalle="inventarioDetalle"
            @cerrar="cerrarModal">
        </modal-ver-inventario-component>

        <modal-camara-component
            v-if="modalAbierto === 'camara'"
            :trabajo-id="trabajoIdParaFoto"
            @cerrar="cerrarModal"
            @foto-capturada="fotoCapturadaHandler">
        </modal-camara-component>

        <modal-ver-foto-component
            v-if="modalAbierto === 'ver-foto'"
            :foto-en-grande="fotoEnGrande"
            @cerrar="cerrarModal">
        </modal-ver-foto-component>
    </div>

    <!-- Importar módulos JavaScript -->
    <script src="js/services/api.js"></script>
    <script src="js/components/LoginComponent.js"></script>
    <script src="js/components/NavbarComponent.js"></script>
    <script src="js/components/DrawerMenuComponent.js"></script>
    <script src="js/components/modulos/DashboardComponent.js"></script>
    <script src="js/components/modulos/ClientesComponent.js"></script>
    <script src="js/components/modulos/TrabajosComponent.js"></script>
    <script src="js/components/modulos/InventarioComponent.js"></script>
    <script src="js/components/modulos/CategoriasComponent.js"></script>
    <script src="js/components/modulos/ProveedoresComponent.js"></script>
    <script src="js/components/modulos/FacturasComponent.js"></script>
    <script src="js/modales/ModalClienteComponent.js"></script>
    <script src="js/modales/ModalTrabajoComponent.js"></script>
    <script src="js/modales/ModalInventarioComponent.js"></script>
    <script src="js/modales/ModalCategoriaComponent.js"></script>
    <script src="js/modales/ModalProveedorComponent.js"></script>
    <script src="js/modales/ModalFacturaComponent.js"></script>
    <script src="js/modales/ModalMovimientoComponent.js"></script>
    <script src="js/modales/ModalVerTrabajoComponent.js"></script>
    <script src="js/modales/ModalVerClienteComponent.js"></script>
    <script src="js/modales/ModalVerInventarioComponent.js"></script>
    <script src="js/modales/ModalCamaraComponent.js"></script>
    <script src="js/modales/ModalVerFotoComponent.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
