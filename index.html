<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redireccionando... | Tapicería Odami Laravel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f5576c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #666;
            margin-bottom: 1.5rem;
        }
        a {
            display: inline-block;
            background: #f5576c;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: background 0.3s;
        }
        a:hover {
            background: #e0455a;
        }
        .info {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
            font-size: 0.875rem;
            color: #888;
        }
        .badge {
            display: inline-block;
            background: #f093fb;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Redireccionando...</h1>
        <p>Te estamos llevando a la aplicación Laravel</p>
        <a href="public/" id="redirect-link">Ir ahora</a>
        <div class="info">
            <p><strong>Frontend:</strong> Vue.js 3 + TailwindCSS</p>
            <p><strong>Backend:</strong> Laravel 10 + Sanctum</p>
            <p><strong>Base de datos:</strong> PostgreSQL</p>
            <span class="badge">SPA Moderna</span>
        </div>
    </div>

    <script>
        // Redirección automática después de 1 segundo
        setTimeout(function() {
            window.location.href = 'public/';
        }, 1000);

        // Actualizar el enlace con la URL completa
        document.getElementById('redirect-link').href = 'public/';
    </script>
</body>
</html>
